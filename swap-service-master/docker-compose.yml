version: '3.8'

services:
  # PostgreSQL Database with PostGIS
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: swap-postgres
    environment:
      POSTGRES_USER: swap_user
      POSTGRES_PASSWORD: swap_password
      POSTGRES_DB: swap_service
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - swap-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swap_user -d swap_service"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: swap-api
    environment:
      # Database configuration
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      DB_PORT: 5432
      DB_SSLMODE: disable
      
      # Application configuration
      PORT: 8080
      GIN_MODE: release
      
      # JWT Secret (change in production)
      JWT_SECRET: ${JWT_SECRET}
      
      # Cloudinary (optional)
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}

      # Geocoding (Mapbox API)
      GEO_API: ${GEO_API}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - swap-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  swap-network:
    driver: bridge
